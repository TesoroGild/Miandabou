<section class="py-4 md:py-16 antialiased bg-white dark:bg-gray-900">
  <div class="max-w-screen-xl px-4 mx-auto 2xl:px-0">
    <div class="lg:grid lg:grid-cols-2 lg:gap-8 xl:gap-16">
      
      <div class="shrink-0 max-w-md lg:max-w-lg mx-auto w-full">
        <div class="bg-gray-100 dark:bg-gray-800 rounded-3xl overflow-hidden shadow-sm">
            <img class="w-full h-auto object-cover hover:scale-105 transition-transform duration-300" 
                 src="{{ picture(tmpItemToDetail.contenthash) }}" alt="item picture" />
        </div>
      </div>

      <div class="mt-6 sm:mt-8 lg:mt-0">
        <div class="flex justify-between items-start">
            <h1 class="text-2xl font-bold text-gray-900 sm:text-3xl dark:text-white">
                {{ tmpItemToDetail.name }}
            </h1>
        </div>

        <div class="mt-4 flex items-center justify-between sm:justify-start sm:gap-8">
          <p class="text-2xl font-extrabold text-gray-900 sm:text-3xl dark:text-white">
            ${{ tmpItemToDetail.price }}
          </p>

          <div class="flex items-center gap-1">
            <div class="flex items-center">
                <svg class="w-5 h-5 text-yellow-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                <span class="ml-1 text-sm font-bold text-gray-900 dark:text-white">5.0</span>
            </div>
            <span class="text-xs text-gray-500 underline">(12 avis)</span>
          </div>
        </div>

        <div class="mt-8 flex flex-col sm:flex-row gap-4">
          <div class="flex items-center justify-between border dark:border-gray-700 rounded-xl p-1 bg-gray-50 dark:bg-gray-800 w-full sm:w-32">
            <button (click)="qty.value = (+qty.value > 1 ? +qty.value - 1 : 1).toString()" 
              class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-black dark:hover:text-white">
              -
            </button>
            <input #qty type="number" value="1" class="w-12 text-center bg-transparent border-none focus:ring-0 font-bold dark:text-white appearance-none m-0" readonly>
            <button (click)="qty.value = (+qty.value + 1).toString()" 
              class="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-black dark:hover:text-white">
              +
            </button>
          </div>

          <button (click)="addToCart(tmpItemToDetail, +qty.value)"
            class="flex-1 text-white bg-blue-700 hover:bg-blue-800 shadow-lg shadow-blue-500/30 font-bold rounded-xl text-md px-8 py-4 flex items-center justify-center transition-all active:scale-95"
          >
            <svg class="w-5 h-5 me-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h1.5L8 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm.75-3H7.5M11 7H6.312M17 4v6m-3-3h6" /></svg>
            {{'Ajouter au panier' | translate}}
          </button>
        </div>

        <hr class="my-8 border-gray-200 dark:border-gray-800" />
        <p class="text-gray-600 dark:text-gray-300 leading-relaxed">
          {{ tmpItemToDetail.description }}
        </p>

        <hr class="my-8 border-gray-200 dark:border-gray-800" />

        <div class="grid grid-cols-2 gap-3">
          <button (click)="openReviewsModal()"
            class="text-gray-900 dark:text-white bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 font-medium rounded-xl text-sm px-4 py-3 transition-colors text-center"
          >
            {{'Voir les avis' | translate}}
          </button>
          <button (click)="openReviewFormModal()"
            class="text-blue-700 dark:text-blue-400 border border-blue-700 dark:border-blue-400 hover:bg-blue-50 dark:hover:bg-blue-900/30 font-medium rounded-xl text-sm px-4 py-3 transition-colors text-center"
          >
            {{'Noter le produit' | translate}}
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<app-reviews-list
  [isOpen]="showReviewsModal"
  [isUserReviews]="false"
  (close)="closeReviewsModal()"
></app-reviews-list>

<app-review-form
  [isOpen]="showReviewFormModal"
  (close)="closeReviewFormModal()"
></app-review-form>
