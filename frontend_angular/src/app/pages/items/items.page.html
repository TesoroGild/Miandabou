<div class="flex justify-end dark:text-white text-gray-700 bg-inherit pt-2"> 
    <p class="flex items-center">{{'Trier par'| translate}} : </p>&nbsp;&nbsp;
    <select id="filter"
        title="selection"
        class="w-50 mt-2 mr-16 rounded-sm bg-inherit"
        [(ngModel)]="filterSelect"
        (change)="filterItems()"
    >
        <option value="sortByPriceAsc" class="dark:text-white dark:bg-[#111827] bg-white text-gray-700">
            {{'prix croissant' | translate}}
        </option>
        <option value="sortByPriceDesc" class="dark:text-white dark:bg-[#111827] bg-white text-gray-700">
            {{'prix décroissant' | translate}}
        </option>
        <option value="sortByNameAsc" class="dark:text-white dark:bg-[#111827] bg-white text-gray-700">
            {{'nom croissant' | translate}}
        </option>
        <option value="sortByNameDesc" class="dark:text-white dark:bg-[#111827] bg-white text-gray-700">
            {{'nom décroissant' | translate}}
        </option>
    </select>
</div>

@if (isLoading) {
    <div class="flex justify-center items-center h-64">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div>
    </div>
}
@else {
    @if(itemsToDisplay.length > 0) {
        <div
            class="sm:grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5">
                <div *ngFor="let item of itemsToDisplay" class="h-[50vh] p-4 flex">
                    <div
                        class="h-full w-full max-w-sm bg-white border border-gray-200 rounded-lg shadow dark:bg-gray-800 dark:border-gray-700 hover:border-yellow-300">
                        <div (click)="showItemDetails(item)" class="h-[70%] w-full">
                            <img 
                                class="rounded-t-lg w-full h-full object-contain" 
                                src="{{ picture(item.contenthash) }}" 
                                alt="product image"
                            />
                        </div>
                        <div class="px-2 pb-2 h-[30%] mx-4">
                            <div (click)="showItemDetails(item)"
                                class="h-1/3 mt-4 text-lg font-medium tracking-tight text-gray-900 dark:text-white"
                            >
                                {{ item.name }}
                            </div>
                            <div class="h-1/3 flex justify-between mt-2">
                                <div class="w-full flex">
                                    <button (click)="decraseQuantityInCart(item)"
                                        class="group rounded-l-full px-3 pt-[5px] pb-[7px] border border-gray-200 flex items-center justify-center shadow-sm shadow-transparent transition-all duration-500 hover:shadow-gray-200 hover:border-gray-300 hover:bg-gray-300 dark:hover:bg-white">
                                        <svg class="stroke-gray-900 transition-all duration-500 group-hover:stroke-black dark:stroke-white dark:group-hover:stroke-black"
                                            xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18"
                                            fill="none">
                                            <path d="M16.5 11H5.5" stroke="" stroke-width="1.6" stroke-linecap="round" />
                                            <path d="M16.5 11H5.5" stroke="" stroke-opacity="0.2" stroke-width="1.6"
                                                stroke-linecap="round" />
                                            <path d="M16.5 11H5.5" stroke="" stroke-opacity="0.2" stroke-width="1.6"
                                                stroke-linecap="round" />
                                        </svg>
                                    </button>
                                    <div class="flex items-center justify-center cursor-not-allowed disabled border-y border-gray-200 outline-none text-gray-900 dark:text-white py-[3px] max-w-[118px] w-3/10"
                                        placeholder="0">
                                        {{ getQuantityInCart(item.id) }}
                                    </div>
                                    <button (click)="addToCart(item)"
                                        class="group rounded-r-full px-3 py-[4px] border border-gray-200 flex items-center justify-center shadow-sm shadow-transparent transition-all duration-500 hover:shadow-gray-200 hover:border-gray-300 hover:bg-gray-300 dark:hover:bg-white">
                                        <svg class="stroke-gray-900 transition-all duration-500 group-hover:stroke-black dark:stroke-white dark:group-hover:stroke-black"
                                            xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22"
                                            fill="none">
                                            <path d="M11 5.5V16.5M16.5 11H5.5" stroke="" stroke-width="1.6"
                                                stroke-linecap="round" />
                                            <path d="M11 5.5V16.5M16.5 11H5.5" stroke="" stroke-opacity="0.2" stroke-width="1.6"
                                                stroke-linecap="round" />
                                            <path d="M11 5.5V16.5M16.5 11H5.5" stroke="" stroke-opacity="0.2" stroke-width="1.6"
                                                stroke-linecap="round" />
                                        </svg>
                                    </button>
                                </div>
                                <div class="content-center">
                                    <span class="text-lg font-extrabold text-gray-900 dark:text-white">${{ item.price }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
            </div>
        </div>
    }
    @else {
        <div class="text-center p-10 text-gray-500">
            <p class="text-center">{{'Aucun article trouvé' | translate}}</p>
        </div>
    }
}
