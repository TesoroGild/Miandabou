<div class="flex justify-end items-center dark:text-white text-gray-700 bg-inherit pt-2 px-4"> 
    <p class="text-sm md:text-base">{{'Trier par'| translate}} : </p>&nbsp;
    <select id="filter"
        class="w-40 md:w-50 rounded-sm bg-inherit border-gray-300 dark:border-gray-700"
        [(ngModel)]="filterSelect"
        (change)="filterItems()"
    >
        <option value="sortByPriceAsc"> {{'prix croissant' | translate}} </option>
        <option value="sortByPriceDesc"> {{'prix décroissant' | translate}} </option>
        <option value="sortByNameAsc"> {{'nom croissant' | translate}} </option>
        <option value="sortByNameDesc"> {{'nom décroissant' | translate}} </option>
    </select>
</div>

@if (isLoading) {
    <div class="flex justify-center items-center h-64">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-700"></div>
    </div>
}
@else {
    @if(itemsToDisplay.length > 0) {
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-2 md:gap-6 p-2 md:p-6">
            
            <div *ngFor="let item of itemsToDisplay" 
                 class="group flex flex-col bg-white border border-gray-200 rounded-lg shadow dark:bg-gray-800 dark:border-gray-700 hover:border-yellow-300 transition-all">
                
                <div (click)="showItemDetails(item)" class="aspect-square w-full p-2 cursor-pointer overflow-hidden">
                    <img 
                        class="w-full h-full object-contain transform group-hover:scale-105 transition-transform duration-300" 
                        src="{{ picture(item.contenthash) }}" 
                        alt="product image"
                    />
                </div>

                <div class="p-3 flex flex-col justify-between flex-grow">
                    <div (click)="showItemDetails(item)"
                         class="text-sm md:text-base font-medium text-gray-900 dark:text-white line-clamp-2 cursor-pointer h-10 md:h-12">
                        {{ item.name }}
                    </div>

                    <div class="flex flex-col sm:flex-row justify-between items-center mt-2 gap-2">
                        <div class="flex items-center border border-gray-200 rounded-full overflow-hidden">
                            <button (click)="decraseQuantityInCart(item)" class="px-2 py-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200">-</button>
                            <span class="px-2 text-xs md:text-sm font-semibold dark:text-white">{{ getQuantityInCart(item.id) }}</span>
                            <button (click)="addToCart(item)" class="px-2 py-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200">+</button>
                        </div>
                        
                        <span class="text-base md:text-lg font-bold text-gray-900 dark:text-white">
                            ${{ item.price }}
                        </span>
                    </div>
                </div>
            </div>
            
        </div>
    }
    @else {
        <div class="text-center p-10 text-gray-500">
            <p>{{'Aucun article trouvé' | translate}}</p>
        </div>
    }
}
