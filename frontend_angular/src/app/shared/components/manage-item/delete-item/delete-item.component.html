<div *ngIf="isOpen" class="fixed inset-0 z-40 bg-black/70 backdrop-blur-sm"></div>

<div *ngIf="isOpen"
    tabindex="-1" 
    class="fixed inset-0 z-50 flex justify-center items-center w-full p-4 overflow-x-hidden overflow-y-auto h-modal md:h-full"
>
    <div class="relative w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow-xl dark:bg-gray-700 overflow-hidden">
            <div class="flex items-center justify-between p-4 border-b rounded-t dark:border-gray-600 border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                    {{'Supprimer un produit' | translate}}
                </h3>
                <button (click)="closeDeleteModal()"
                    class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            
            <div class="flex p-4 gap-4">
                <div class="w-1/3">
                    <img class="rounded-lg w-full h-32 object-cover border dark:border-gray-600" 
                        [src]="picture(itemToDelete.contenthash)" 
                        alt="product to delete"
                    >
                </div>
                <div class="w-2/3 flex flex-col justify-center">
                    <p class="text-gray-700 dark:text-white text-sm">
                        <strong class="font-bold">{{'Nom' | translate}}</strong> : {{ itemToDelete.name }}
                    </p>
                    <p class="text-gray-700 dark:text-white text-sm mt-1">
                        <strong class="font-bold">{{'Catégorie' | translate}}</strong> : {{ itemToDelete.category }}
                    </p>
                </div>
            </div>

            <div class="p-4 bg-gray-50 dark:bg-gray-800/50 flex flex-col items-center">
                <p class="text-gray-600 dark:text-gray-300 text-sm text-center mb-4 px-2">
                    {{'Etes-vous sur de vouloir supprimer cet article de votre stock' | translate}}?
                </p>
                <div class="flex justify-center w-full gap-3">
                    <button class="flex-1 text-gray-900 bg-white border border-gray-300 hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-gray-200 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-700"
                        (click)="closeDeleteModal()"
                    >
                        {{'Annuler' | translate}}
                    </button>
                    <button class="flex-1 text-white bg-red-600 hover:bg-red-700 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-red-500 dark:hover:bg-red-600"
                        (click)="deleteItem()"
                    >
                        {{'Supprimer' | translate}}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
