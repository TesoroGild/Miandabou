<!-- Backdrop-->
<div *ngIf="isOpen" class="fixed inset-0 z-10 bg-black opacity-70"></div>

<!-- Main modal -->
<div *ngIf="isOpen"
    tabindex="-1" 
    class="mt-60 overflow-y-auto overflow-x-hidden fixed z-20 flex justify-center items-center w-full md:inset-0 h-3/5 max-h-full"
>
    <div class="relative p-4 w-full max-w-1/3 max-h-full">
        <!-- Modal content -->
        <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
            <!-- Modal header -->
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                    Supprimer un produit
                </h3>
                <button (click)="closeDeleteModal()"
                    class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-toggle="crud-modal">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            <!-- Modal body -->
             <div class="flex">
                <div class="w-1/2">
                    <img class="rounded-xl w-full h-full object-contain mt-2 ml-2" 
                        src="{{ picture(itemToDelete.contenthash) }}" 
                        alt="product to delete"
                    >
                </div>
                <div class="w-1/2 content-center justify-items-center">
                    <p class="text-white"><strong>Nom</strong> : {{ itemToDelete.name }}</p>
                    <p class="text-white"><strong>Catégorie</strong> : {{ itemToDelete.category }}</p>
                </div>
            </div>
            <!-- Modal footer -->
            <div class="p-2 flex flex-col justify-center">
                <p class="text-white text-center">Etes-vous sur de vouloir supprimer cet article de votre stock?</p>
                <div class="flex justify-center">
                    <button class="text-white inline-flex items-center bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 mr-2"
                        (click)="closeDeleteModal()"
                    >
                        Annuler
                    </button>
                    <button class="text-white inline-flex items-center bg-red-600 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800"
                        (click)="deleteItem()"
                    >
                        Supprimer
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
