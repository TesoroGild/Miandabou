@if (isOpen) {
    <div class="fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm transition-opacity"></div>

    <div class="fixed inset-0 z-[110] flex items-center justify-center p-4 sm:p-6">
        
        <div class="relative w-full max-w-2xl max-h-[90vh] overflow-hidden rounded-lg bg-white shadow-xl dark:bg-gray-800 flex flex-col">
            
            <div class="flex items-center justify-between border-b border-gray-200 p-4 dark:border-gray-700 md:p-5">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                    {{ (forCreation ? 'Créer un avis' : 'Modifier votre avis') | translate }}
                </h3>
                
                <button (click)="closeReviewFormModal()" type="button" class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-transparent text-sm text-gray-400 hover:bg-gray-200 hover:text-gray-900 dark:hover:bg-gray-600 dark:hover:text-white">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>

            <div class="overflow-y-auto p-4 md:p-5">
                <form [formGroup]="reviewForm" (ngSubmit)="submit()" id="reviewForm">
                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label class="mb-2 block text-sm font-medium text-gray-900 dark:text-white">{{'Note' | translate}}</label>
                            <div class="flex items-center space-x-2">
                                <div class="flex items-center">
                                    @for (star of stars; track star) {
                                        <button 
                                            type="button"
                                            (click)="setRating(star)"
                                            class="p-1 transition-transform active:scale-125 focus:outline-none"
                                            [class.text-yellow-300]="star <= currentRating"
                                            [class.text-gray-300]="star > currentRating"
                                            [class.dark:text-gray-600]="star > currentRating">
                                            <svg class="h-8 w-8 fill-current" viewBox="0 0 22 20">
                                                <path d="M20.924 7.625a1.523 1.523 0 0 0-1.238-1.044l-5.051-.734-2.259-4.577a1.534 1.534 0 0 0-2.752 0L7.365 5.847l-5.051.734A1.535 1.535 0 0 0 1.463 9.2l3.656 3.563-.863 5.031a1.532 1.532 0 0 0 2.226 1.616L11 17.033l4.518 2.375a1.534 1.534 0 0 0 2.226-1.617l-.863-5.03L20.537 9.2a1.523 1.523 0 0 0 .387-1.575Z" />
                                            </svg>
                                        </button>
                                    }
                                </div>
                                <span class="text-lg font-bold text-gray-900 dark:text-white">{{ currentRating }} / 5</span>
                            </div>
                        </div>

                        <div>
                            <label for="content" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white">{{'Description de l\'avis' | translate}}</label>
                            <textarea formControlName="content" id="content" rows="4" 
                                class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400" 
                                required></textarea>
                        </div>
                    </div>
                </form>
            </div>

            <div class="flex items-center border-t border-gray-200 p-4 dark:border-gray-700 md:p-5 space-x-3">
                <button type="submit" form="reviewForm"
                    [disabled]="reviewForm.invalid"
                    class="flex-1 sm:flex-none rounded-lg bg-blue-700 px-5 py-2.5 text-center text-sm font-medium text-white hover:bg-blue-800 disabled:opacity-50">
                    {{ (forCreation ? 'Créer' : 'Modifier') | translate }}
                </button>
                <button type="button" (click)="closeReviewFormModal()" 
                    class="flex-1 sm:flex-none rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-900 hover:bg-gray-100 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:bg-gray-700">
                    {{"Annuler" | translate}}
                </button>
            </div>
        </div>
    </div>
}
