<div *ngIf="isVisible"
    tabindex="-1"
    style="justify-self: anchor-center"
    class="flex items-center w-full max-w-xs p-4 mb-4 rounded-lg shadow-sm fixed bottom-5 right-5"
    [ngClass]="{
        'text-green-500 bg-green-100 dark:bg-green-600 dark:text-green-200': type === 'success',
        'text-red-500 bg-red-100 dark:bg-red-800 dark:text-red-200': type === 'error',
        'text-orange-500 bg-orange-100 dark:bg-orange-700 dark:text-orange-200': type === 'warning',
        'dark:text-black dark:bg-gray-200': type === 'info'
    }"
    role="alert"
>
    <div class="inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg"
        [ngClass]="{
            'bg-green-100 dark:bg-green-800': type === 'success',
            'bg-red-100 dark:bg-red-800': type === 'error',
            'bg-orange-100 dark:bg-orange-700': type === 'warning'
        }"
    >
        <svg *ngIf="type === 'success'"
            class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>
        </svg>
        <span class="sr-only">Check icon</span>
        <svg *ngIf="type === 'error'"
            class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 11.793a1 1 0 1 1-1.414 1.414L10 11.414l-2.293 2.293a1 1 0 0 1-1.414-1.414L8.586 10 6.293 7.707a1 1 0 0 1 1.414-1.414L10 8.586l2.293-2.293a1 1 0 0 1 1.414 1.414L11.414 10l2.293 2.293Z"/>
        </svg>
        <span class="sr-only">Error icon</span>
        <svg *ngIf="type === 'warning'"
            class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
            <path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM10 15a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm1-4a1 1 0 0 1-2 0V6a1 1 0 0 1 2 0v5Z"/>
        </svg>
        <span class="sr-only">Warning icon</span>
    </div>
    <a *ngIf="type === 'info'" 
        [routerLink]="['/cart']" 
        class="inline-flex items-center justify-center shrink-0 w-8 h-8 rounded-lg">
        <svg class="w-6 h-6 text-gray-800" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 20 20">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" d="M5 4h1.5L9 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-8.5-3h9.25L19 7H7.312"/>
        </svg>
        <span class="sr-only">Cart icon</span>
    </a>
    <div *ngIf="type != 'info'"  class="ms-3 text-sm font-normal">{{ message }}</div>
    <div [routerLink]="['/cart']" *ngIf="type === 'info'"  class="ms-3 text-sm font-normal cursor-pointer">{{ message }}</div>
    &nbsp;&nbsp;
    <button type="button" 
        class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8 dark:text-gray-500 dark:hover:text-white dark:bg-gray-800 dark:hover:bg-gray-700" 
        data-dismiss-target="#toast-success" 
        aria-label="Close"
        (click)="closeToast()"
    >
        <span class="sr-only">Close</span>
        <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
        </svg>
    </button>
</div>
