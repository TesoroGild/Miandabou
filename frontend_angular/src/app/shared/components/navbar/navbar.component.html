<nav class="fixed z-50 w-full bg-white border-gray-200 dark:bg-gray-900 shadow-sm">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    
    <a [routerLink]="['/home']" class="flex items-center space-x-2 rtl:space-x-reverse">
        <img src="/assets/img/logo.jpg" class="h-8" alt="Logo" />
        <span class="self-center text-xl md:text-2xl font-semibold whitespace-nowrap dark:text-white">Miandabou</span>
    </a>

    <div class="flex items-center md:order-2 space-x-2 md:space-x-4">
        
        <div #dropdownLangageWrapper class="relative">
            <button (click)="toggleLanguagesDropdown()"
                class="inline-flex items-center font-medium justify-center px-2 py-2 md:px-4 text-sm text-gray-900 dark:text-white rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                
                <ng-container [ngSwitch]="currentLang.code">
                    <svg *ngSwitchCase="'fr'" class="h-4 w-4 rounded-full md:me-2" viewBox="0 0 512 512" transform="rotate(90)">
                        <rect width="512" height="170.7" fill="#ed2939" />
                        <rect y="170.7" width="512" height="170.7" fill="#fff" />
                        <rect y="341.4" width="512" height="170.7" fill="#0052b4" />
                    </svg>
                    <svg *ngSwitchDefault class="h-4 w-4 rounded-full md:me-2" viewBox="0 0 512 512">
                        </svg>
                </ng-container>
                
                <span class="hidden sm:inline">{{ currentLang.labelKey | translate }}</span>
            </button>

            <div class="absolute right-0 z-50 mt-2 w-44 bg-white divide-y divide-gray-100 rounded-lg shadow-lg dark:bg-gray-700" 
                 [ngClass]="{ 'hidden': !isLanguagesDropdownOpen }">
                <ul class="py-2 text-sm">
                    <li>
                        <a (click)="changeLanguage('fr')" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-white cursor-pointer">Français (FR)</a>
                    </li>
                    <li>
                        <a (click)="changeLanguage('en')" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 dark:text-white cursor-pointer">English (US)</a>
                    </li>
                </ul>
            </div>
        </div>

        <div #dropdownProfileWrapper class="relative">
            @if(isLoggedIn()) {
                <button (click)="toggleProfileDropdown()" class="flex text-sm bg-gray-800 rounded-full focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600">
                    <img class="w-8 h-8 rounded-full" [src]="picture()" alt="user">
                </button>
                <div class="absolute right-0 z-50 mt-2 w-48 bg-white divide-y divide-gray-100 rounded-lg shadow-lg dark:bg-gray-700"
                     [ngClass]="{ 'hidden': !isProfileDropdownOpen }">
                    <div class="px-4 py-3 text-sm">
                        <div class="font-medium truncate dark:text-white">{{ userToDisplay.username }}</div>
                    </div>
                    <ul class="py-2 text-sm text-gray-700 dark:text-gray-200">
                        <li><a (click)="closeProfileDropdown()" [routerLink]="['/reviews']" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600">{{ 'Mes avis' | translate }}</a></li>
                        <li><a (click)="logOut()" class="block px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">{{ 'Déconnexion' | translate }}</a></li>
                    </ul>
                </div>
            } @else {
                <button [routerLink]="['/login']" class="p-2 text-blue-700 border border-blue-700 rounded-lg hover:bg-blue-50 dark:text-blue-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </button>
            }
        </div>

        <button type="button" (click)="toggleMenu()"
            class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:ring-2 focus:ring-gray-200 dark:text-gray-400 dark:hover:bg-gray-700">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 17 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/></svg>
        </button>
    </div>

    <div [ngClass]="{ 'hidden': !isMenuOpen, 'block': isMenuOpen }" class="items-center justify-between w-full md:flex md:w-auto md:order-1" id="navbar-menu">
        <ul class="flex flex-col font-medium p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:space-x-8 md:flex-row md:mt-0 md:border-0 md:bg-white dark:bg-gray-800 md:dark:bg-gray-900">
            <li><a (click)="navigateToItems()" class="block py-2 px-3 text-blue-700 md:p-0 cursor-pointer">{{ 'Articles' | translate }}</a></li>
            <li><a (click)="navigateToCart()" class="block py-2 px-3 text-gray-900 md:p-0 dark:text-white cursor-pointer">{{ 'Panier' | translate }}</a></li>
            <li><a (click)="navigateToAbout()" class="block py-2 px-3 text-gray-900 md:p-0 dark:text-white cursor-pointer">{{ 'A propos' | translate }}</a></li>
        </ul>
    </div>
  </div>
  <hr class="h-px bg-gray-600 border-0">
</nav>
