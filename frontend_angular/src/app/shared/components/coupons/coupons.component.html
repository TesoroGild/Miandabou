<div *ngIf="isCouponsOpen" class="fixed inset-0 z-[60] bg-black/70 backdrop-blur-sm"></div>

<div *ngIf="isCouponsOpen" tabindex="-1" id="policyModal" 
    class="fixed z-[70] inset-0 overflow-y-auto flex items-center justify-center p-4">
    
    <div class="bg-white dark:bg-gray-900 w-full max-w-3xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden border dark:border-gray-700">
        
        <div class="flex items-center justify-between p-4 md:p-6 border-b dark:border-gray-600 bg-gray-50/50 dark:bg-gray-800/50">
            <h3 class="text-xl font-bold text-gray-900 dark:text-white">
                {{'Coupons disponibles' | translate}}
            </h3>
            <button type="button" (click)="closeCouponsModal()"
                class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-xl text-sm w-9 h-9 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-700 dark:hover:text-white transition-colors">
                <svg class="w-3.5 h-3.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
                </svg>
                <span class="sr-only">Close modal</span>
            </button>
        </div>

        <div class="p-4 md:p-6 overflow-y-auto flex-1">
            
            <div class="mb-4 bg-white dark:bg-gray-900 sticky top-0 z-10 pb-2">
                <label for="table-search" class="sr-only">{{'Rechercher' | translate}}</label>
                <div class="relative max-w-sm">
                    <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                        <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z" />
                        </svg>
                    </div>
                    <input type="text" id="table-search"
                        class="block w-full p-2.5 ps-10 text-sm text-gray-900 border border-gray-300 rounded-xl bg-gray-50 focus:ring-[#e7cc96] focus:border-[#e7cc96] dark:bg-gray-800 dark:border-gray-700 dark:placeholder-gray-400 dark:text-white"
                        placeholder="Search for items">
                </div>
            </div>

            <div class="relative overflow-x-auto border dark:border-gray-700 rounded-xl">
                <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-800 dark:text-gray-400">
                        <tr>
                            <th scope="col" class="p-4 w-10"></th>
                            <th scope="col" class="px-6 py-4">{{'Nom' | translate}}</th>
                            <th scope="col" class="px-6 py-4">{{'Valeur' | translate}}</th>
                            <th scope="col" class="px-6 py-4">{{'Date de fin' | translate}}</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y dark:divide-gray-700">
                        <ng-container *ngIf="coupons.length != 0; else couponsEmpty">
                            <tr *ngFor="let coupon of coupons; let i = index"
                                class="bg-white dark:bg-gray-900 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                                <td class="p-4" (click)="setCoupon(coupon, i)">
                                    <input type="checkbox" [checked]="checkboxStates[i]"
                                        class="w-4 h-4 text-[#af8124] bg-gray-100 border-gray-300 rounded focus:ring-[#e7cc96] dark:bg-gray-700 dark:border-gray-600">
                                </td>
                                <th scope="row" class="px-6 py-4 font-bold text-gray-900 whitespace-nowrap dark:text-white">
                                    {{ coupon.name }}
                                </th>
                                <td class="px-6 py-4 font-medium text-[#af8124]">
                                    <span *ngIf="coupon.value != null">${{ coupon.value }}</span>
                                    <span *ngIf="coupon.rate != null">{{ coupon.rate }}%</span>
                                </td>
                                <td class="px-6 py-4">
                                    {{ displayDate(coupon.expirationDate) }}
                                </td>
                            </tr>
                        </ng-container>
                        <ng-template #couponsEmpty>
                            <tr>
                                <td colspan="4" class="p-8 text-center text-gray-500 italic">
                                    {{'Aucun coupon disponible' | translate}}.
                                </td>
                            </tr>
                        </ng-template>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-2 p-4 md:p-6 border-t border-gray-200 dark:border-gray-600 bg-gray-50/50 dark:bg-gray-800/50">
            <button (click)="cancelCoupons()"
                class="flex-1 min-w-[120px] text-white bg-red-500 hover:bg-red-600 font-medium rounded-xl text-sm px-5 py-2.5 transition-colors">
                {{'Tout annuler' | translate}}
            </button>
            <button (click)="applyCoupons()"
                class="flex-1 min-w-[120px] text-gray-900 bg-white border border-gray-300 hover:bg-gray-100 font-medium rounded-xl text-sm px-5 py-2.5 dark:bg-gray-800 dark:text-white dark:border-gray-600 transition-colors">
                {{'Appliquer' | translate}}
            </button>
            <button (click)="applyAllCoupons()"
                class="w-full md:w-auto text-gray-900 bg-white border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700 font-bold rounded-xl text-sm px-8 py-2.5 shadow-md transition-all">
                {{'Tout appliquer' | translate}}
            </button>
        </div>
    </div>
</div>
